<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Valentino Castiglione</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+PGNpcmNsZSBjeD0iMTYiIGN5PSIxNiIgcj0iMTYiIGZpbGw9IiNjYzAwMDAiLz48L3N2Zz4=">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    color: #f2f2f2;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .scene {
    position: relative;
    width: 100vw; height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  .scene::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, #111 0%, #000 70%);
    z-index: 0;
  }

  .error-number {
    position: absolute;
    font-size: clamp(200px, 55vw, 900px);
    font-weight: 700;
    letter-spacing: -0.06em;
    line-height: 1;
    color: #f2f2f2;
    opacity: 0.38;
    pointer-events: none;
    user-select: none;
    z-index: 0;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    white-space: nowrap;
  }

  .content {
    position: relative; z-index: 2;
    text-align: center;
    padding: 0 32px;
  }

  .content h1 {
    font-size: clamp(11px, 1.5vw, 14px);
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(242,242,242,0.4);
    margin-bottom: 16px;
  }

  .content p {
    font-size: clamp(22px, 3.5vw, 42px);
    font-weight: 700;
    color: #f2f2f2;
    line-height: 1.2;
    letter-spacing: -0.02em;
    margin-bottom: 40px;
    max-width: 600px;
  }

  .home-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    height: 48px;
    padding: 0 28px;
    background: rgba(255,255,255,0.92);
    color: #000;
    border: none;
    border-radius: 100px;
    font-family: 'Poppins', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .home-btn:hover { opacity: 0.75; }

  .site-chip {
    position: fixed;
    top: 20px; left: 20px;
    display: inline-flex; align-items: center;
    height: 38px; padding: 0 16px;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 100px;
    background: rgba(0,0,0,0.92);
    font-family: 'Poppins', sans-serif;
    font-size: 13px; font-weight: 700;
    color: #fff;
    text-decoration: none;
    transition: opacity 0.2s;
  }
  .site-chip:hover { opacity: 0.7; }

  .foot {
    position: fixed;
    bottom: 20px;
    font-size: 9px;
    letter-spacing: 0.06em;
    color: rgba(242,242,242,0.2);
    text-align: center;
    width: 100%;
  }

  .scanlines {
    position: fixed; inset: 0; z-index: 10;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
  }

  @media (max-width: 768px) {
    .content p { font-size: clamp(20px, 6vw, 32px); }
  }
</style>
</head>
<body>
<a class="site-chip" href="index.html">← Valentino Castiglione</a>

<div class="scanlines"></div>

<div class="scene">
  <div class="error-number">404</div>
  <div class="content">
    <h1>Page not found</h1>
    <p>Looks like this scene was cut in post.<br>The page you're looking for doesn't exist.</p>
    <a class="home-btn" href="index.html">← Back to portfolio</a>
  </div>
</div>

<div class="foot">© 2026 Valentino Castiglione — P.IVA 01904320932</div>
</body>
</html>
